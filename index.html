<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>부릉부릉 학교</title>
<style>
  :root {
    --bg: #FFF9F0;
    --korean-main: #FFB800;
    --korean-dark: #E09800;
    --korean-light: #FFF3C4;
    --math-main: #FF5252;
    --math-dark: #D32F2F;
    --english-main: #4285F4;
    --english-dark: #1A56C4;
    --correct: #4CAF50;
    --wrong: #FF5252;
    --text-dark: #2D2D2D;
    --text-mid: #666;
    --white: #FFFFFF;
    --shadow: 0 4px 20px rgba(0,0,0,0.10);
    --radius: 20px;
    --radius-sm: 12px;
    --accent: var(--korean-main);
    --accent-dark: var(--korean-dark);
    --accent-light: var(--korean-light);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #app {
    position: relative;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: 0 0 64px 0;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.4);
  }
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }
  #screen-zone, #screen-garage, #screen-settings { overflow-y: auto; }

  /* ── 시작 화면 ── */
  #screen-start {
    align-items: center; justify-content: center; gap: 20px; padding: 32px 28px;
    background: linear-gradient(160deg, #FFF9F0 0%, #FFF3C4 100%);
  }
  .app-logo { font-size: 80px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 8px 16px rgba(255,184,0,0.3)); }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-14px) rotate(3deg)} }
  .app-title { font-size: 30px; font-weight: 900; color: var(--text-dark); text-align: center; letter-spacing: -1px; }
  .app-title em { color: var(--korean-main); font-style: normal; display: block; font-size: 13px; font-weight: 700; letter-spacing: 3px; margin-top: 4px; }
  .name-section { width: 100%; background: white; border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px; }
  .name-section label { font-size: 13px; font-weight: 700; color: var(--text-mid); text-align: center; }
  .name-section input { width: 100%; padding: 14px 18px; border: 3px solid var(--korean-main); border-radius: var(--radius-sm); font-size: 22px; font-weight: 900; text-align: center; color: var(--text-dark); background: var(--bg); outline: none; }
  .name-section input::placeholder { color: #CCC; font-weight: 400; font-size: 16px; }
  .btn-start { width: 100%; padding: 18px; background: var(--korean-main); color: white; border: none; border-radius: var(--radius); font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--korean-dark), 0 8px 20px rgba(255,184,0,0.4); transition: transform 0.1s, box-shadow 0.1s; letter-spacing: 1px; }
  .btn-start:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--korean-dark); }

  /* ── 과목 선택 ── */
  #screen-subject { padding: 14px 16px; gap: 10px; justify-content: space-between; }
  .greeting { font-size: 16px; font-weight: 900; color: var(--text-dark); text-align: center; flex-shrink: 0; }
  .greeting em { color: var(--korean-main); font-style: normal; }
  .road-progress { background: white; border-radius: var(--radius); padding: 10px 16px; box-shadow: var(--shadow); flex-shrink: 0; }
  .road-progress-label { font-size: 11px; font-weight: 700; color: var(--text-mid); margin-bottom: 6px; }
  .road-track { height: 14px; background: #EEE; border-radius: 8px; overflow: hidden; }
  .road-fill { height: 100%; background: linear-gradient(90deg, var(--korean-main), #FF8C00); border-radius: 8px; transition: width 0.6s ease; min-width: 20px; display: flex; align-items: center; justify-content: flex-end; padding-right: 3px; font-size: 11px; }
  .subject-grid { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .subject-card {
    background: white; border-radius: var(--radius); padding: 0; box-shadow: var(--shadow);
    display: flex; align-items: center; cursor: pointer;
    border: 3px solid transparent; transition: transform 0.15s, box-shadow 0.15s;
    flex: 1; overflow: hidden; position: relative;
  }
  .subject-card:active { transform: scale(0.97); }
  .subject-card.korean { border-color: var(--korean-main); }
  .subject-card.math   { border-color: var(--math-main); }
  .subject-card.english{ border-color: var(--english-main); }
  .subject-card-stripe {
    width: 8px; height: 100%; flex-shrink: 0;
  }
  .korean .subject-card-stripe { background: var(--korean-main); }
  .math   .subject-card-stripe { background: var(--math-main); }
  .english .subject-card-stripe{ background: var(--english-main); }
  .subject-card-body { display: flex; align-items: center; gap: 14px; padding: 14px 16px; flex: 1; }
  .subject-icon { font-size: 36px; flex-shrink: 0; }
  .subject-info { flex: 1; }
  .subject-name { font-size: 19px; font-weight: 900; color: var(--text-dark); }
  .subject-desc { font-size: 11px; color: var(--text-mid); margin-top: 2px; }
  .subject-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; color: white; flex-shrink: 0; }
  .subject-progress-mini { font-size: 10px; color: var(--text-mid); margin-top: 4px; }
  .progress-strip { background: white; border-radius: var(--radius); padding: 10px 14px; box-shadow: var(--shadow); display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .star-info { flex: 1; }
  .star-info p { font-size: 10px; color: var(--text-mid); }
  .star-info strong { font-size: 16px; font-weight: 900; color: var(--text-dark); }

  /* ── 존 선택 ── */
  #screen-zone { padding: 18px 16px; gap: 12px; }
  .zone-header { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .btn-back { background: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; }
  .zone-title { font-size: 20px; font-weight: 900; color: var(--text-dark); }
  .zone-list { display: flex; flex-direction: column; gap: 10px; }
  .zone-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.1s; border-left: 5px solid #EEE; }
  .zone-card:active { transform: scale(0.97); }
  .zone-card.locked { opacity: 0.35; pointer-events: none; }
  .zone-card.active-zone { border-left-color: var(--accent); }
  .zone-num { width: 40px; height: 40px; background: var(--korean-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 900; color: var(--korean-dark); flex-shrink: 0; }
  .zone-num.done { background: var(--correct); color: white; }
  .zone-info { flex: 1; }
  .zone-name { font-size: 15px; font-weight: 700; color: var(--text-dark); }
  .zone-sub { font-size: 11px; color: var(--text-mid); margin-top: 2px; }
  .zone-arrow { font-size: 20px; color: #CCC; }

  /* ── 학습 화면 ── */
  #screen-learn { padding: 12px 16px; gap: 10px; }
  .learn-header { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .learn-progress-bar { flex: 1; height: 8px; background: #EEE; border-radius: 4px; overflow: hidden; }
  .learn-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); border-radius: 4px; transition: width 0.4s ease; }
  .learn-step-txt { font-size: 12px; font-weight: 700; color: var(--text-mid); white-space: nowrap; }

  /* 학습 카드 — 완전 새 구조 */
  .learn-card {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center;
    flex: 1; overflow: hidden; position: relative;
  }
  .card-top-band {
    width: 100%; height: 6px; flex-shrink: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-dark));
  }
  .card-body {
    flex: 1; width: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px 16px; gap: 8px; position: relative;
  }
  .card-subject-label {
    position: absolute; top: 10px; left: 14px;
    font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 1px;
  }

  /* 비주얼 영역 */
  .card-visual {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; flex-wrap: wrap;
  }
  .card-visual-main { font-size: 72px; line-height: 1; }
  .card-visual-emoji { font-size: 56px; line-height: 1; }
  .card-visual-scene {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .card-visual-scene-row { display: flex; gap: 6px; align-items: flex-end; }

  /* 글자/단어 표시 */
  .card-char-display {
    font-size: 80px; font-weight: 900; color: var(--text-dark);
    line-height: 1; letter-spacing: -2px; text-align: center;
  }
  .card-char-display.small { font-size: 40px; }
  .card-char-display.sentence { font-size: 26px; font-weight: 800; }

  /* 설명 태그 */
  .card-tag {
    background: var(--accent-light); color: var(--accent-dark);
    font-size: 13px; font-weight: 700; padding: 5px 14px;
    border-radius: 20px; text-align: center;
    border: 2px solid var(--accent);
  }
  .card-sub-text {
    font-size: 20px; color: var(--text-mid); font-weight: 700; text-align: center;
  }

  /* 소리 버튼 */
  .btn-sound {
    background: var(--accent-light); border: 2.5px solid var(--accent);
    border-radius: 50px; padding: 9px 22px; font-size: 16px; font-weight: 700;
    color: var(--accent-dark); cursor: pointer; display: flex; align-items: center; gap: 7px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-sound:active, .btn-sound.playing { background: var(--accent); color: white; }

  /* 선택지 */
  .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; flex-shrink: 0; }
  .options-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .option-btn {
    background: white; border: 2.5px solid #E0E0E0; border-radius: var(--radius-sm);
    padding: 10px 6px; font-weight: 900; color: var(--text-dark); cursor: pointer;
    text-align: center; box-shadow: 0 3px 0 #DDD; transition: all 0.12s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    height: 80px; justify-content: center;
  }
  .option-btn .opt-emoji { font-size: 28px; line-height: 1; }
  .option-btn .opt-char { font-size: 22px; font-weight: 900; }
  .option-btn .opt-label { font-size: 10px; color: var(--text-mid); font-weight: 600; }
  .option-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #DDD; }
  .option-btn.correct { border-color: var(--correct); background: #E8F5E9; box-shadow: 0 3px 0 #4CAF50; animation: correctPop 0.3s ease; }
  .option-btn.wrong   { border-color: var(--wrong); background: #FFEBEE; box-shadow: 0 3px 0 #FF5252; animation: shake 0.3s ease; }
  @keyframes correctPop { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

  .btn-next { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--accent-dark); display: none; flex-shrink: 0; transition: transform 0.1s, box-shadow 0.1s; }
  .btn-next.visible { display: block; }
  .btn-next:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--accent-dark); }

  /* ── 결과 ── */
  #screen-result { align-items: center; justify-content: center; gap: 18px; padding: 32px 24px; background: linear-gradient(160deg, #FFF9F0, #FFF3C4); }
  .result-emoji { font-size: 80px; animation: float 1s ease-in-out infinite; }
  .result-title { font-size: 26px; font-weight: 900; color: var(--text-dark); text-align: center; }
  .result-sub { font-size: 14px; color: var(--text-mid); text-align: center; }
  .stamp-row { display: flex; gap: 10px; justify-content: center; }
  .stamp { width: 52px; height: 52px; background: var(--korean-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 3px solid var(--korean-main); animation: stampIn 0.4s ease backwards; box-shadow: 0 3px 10px rgba(255,184,0,0.3); }
  @keyframes stampIn { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  .result-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .btn-continue { padding: 16px; background: var(--korean-main); color: white; border: none; border-radius: var(--radius); font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--korean-dark); }
  .btn-home2 { padding: 13px; background: white; color: var(--text-mid); border: 2px solid #DDD; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; }

  /* ── 차고지 ── */
  #screen-garage { padding: 18px 16px; gap: 12px; }
  .garage-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .garage-item { background: white; border-radius: var(--radius-sm); padding: 12px 6px; text-align: center; box-shadow: var(--shadow); }
  .garage-item .g-emoji { font-size: 32px; }
  .garage-item p { font-size: 9px; color: var(--text-mid); margin-top: 4px; font-weight: 600; }
  .garage-item.locked { opacity: 0.18; filter: grayscale(1); }

  /* ── 설정 ── */
  #screen-settings { padding: 16px; gap: 12px; }
  .settings-header { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .settings-section { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .settings-label { font-size: 10px; font-weight: 700; color: var(--text-mid); letter-spacing: 1px; padding: 10px 16px 4px; text-transform: uppercase; }
  .settings-row { display: flex; align-items: center; padding: 13px 16px; gap: 12px; border-top: 1px solid #F5F5F5; }
  .settings-row:first-of-type { border-top: none; }
  .settings-row-icon { font-size: 22px; flex-shrink: 0; }
  .settings-row-info { flex: 1; }
  .settings-row-title { font-size: 14px; font-weight: 700; color: var(--text-dark); }
  .settings-row-desc { font-size: 10px; color: var(--text-mid); margin-top: 1px; }
  .toggle-wrap { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #CCC; border-radius: 26px; cursor: pointer; transition: background 0.25s; }
  .toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .toggle-wrap input:checked + .toggle-slider { background: var(--korean-main); }
  .toggle-wrap input:checked + .toggle-slider::before { transform: translateX(22px); }
  .settings-name-wrap { display: flex; gap: 8px; align-items: center; padding: 10px 16px 14px; }
  .settings-name-input { flex: 1; padding: 9px 12px; border: 2px solid #E0E0E0; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700; color: var(--text-dark); outline: none; }
  .settings-name-input:focus { border-color: var(--korean-main); }
  .btn-name-save { padding: 9px 14px; background: var(--korean-main); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-reset { width: 100%; padding: 13px; background: none; border: 2px solid #FFCDD2; border-radius: var(--radius); color: var(--wrong); font-size: 13px; font-weight: 700; cursor: pointer; }
  .toast { position: absolute; bottom: 75px; left: 50%; transform: translateX(-50%) translateY(16px); background: #2D2D2D; color: white; padding: 8px 20px; border-radius: 50px; font-size: 12px; font-weight: 700; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── 네비 ── */
  .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 64px; background: white; border-top: 1.5px solid #F0F0F0; display: flex; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); }
  .nav-btn { flex: 1; padding: 10px 0; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 9px; font-weight: 700; color: #BBB; transition: color 0.15s; }
  .nav-btn.active { color: var(--korean-main); }
  .nav-btn span:first-child { font-size: 22px; }
</style>
</head>
<body>
<div id="app">

  <!-- ① 시작 -->
  <div id="screen-start" class="screen active">
    <div class="app-logo">🚌</div>
    <div class="app-title">부릉부릉 학교<em>BROOM BROOM SCHOOL</em></div>
    <div class="name-section">
      <label>✏️ 이름을 알려줘요!</label>
      <input type="text" id="input-name" placeholder="예: 지민" maxlength="6">
    </div>
    <button class="btn-start" onclick="startApp()">🚀 출발!</button>
  </div>

  <!-- ② 과목 -->
  <div id="screen-subject" class="screen">
    <div class="greeting" id="greeting-text"></div>
    <div class="road-progress">
      <div class="road-progress-label">🛣️ 전체 학습 진행</div>
      <div class="road-track"><div class="road-fill" id="total-progress-fill" style="width:0%">🚌</div></div>
    </div>
    <div class="subject-grid">
      <div class="subject-card korean" onclick="goToZone('korean')">
        <div class="subject-card-stripe"></div>
        <div class="subject-card-body">
          <div class="subject-icon">🚌</div>
          <div class="subject-info">
            <div class="subject-name">국어</div>
            <div class="subject-desc">한글 자음 · 모음 · 단어 · 문장</div>
            <div class="subject-progress-mini" id="prog-korean">0% 완료</div>
          </div>
          <div class="subject-badge" style="background:#FFB800">학습중</div>
        </div>
      </div>
      <div class="subject-card math" onclick="goToZone('math')">
        <div class="subject-card-stripe"></div>
        <div class="subject-card-body">
          <div class="subject-icon">🚒</div>
          <div class="subject-info">
            <div class="subject-name">수학</div>
            <div class="subject-desc">숫자 · 크기비교 · 도형 · 더하기</div>
            <div class="subject-progress-mini" id="prog-math">0% 완료</div>
          </div>
          <div class="subject-badge" style="background:#FF5252">학습중</div>
        </div>
      </div>
      <div class="subject-card english" onclick="goToZone('english')">
        <div class="subject-card-stripe"></div>
        <div class="subject-card-body">
          <div class="subject-icon">🚓</div>
          <div class="subject-info">
            <div class="subject-name">영어</div>
            <div class="subject-desc">알파벳 · 단어 · 인사표현</div>
            <div class="subject-progress-mini" id="prog-english">0% 완료</div>
          </div>
          <div class="subject-badge" style="background:#4285F4">학습중</div>
        </div>
      </div>
    </div>
    <div class="progress-strip">
      <span style="font-size:22px">⭐</span>
      <div class="star-info"><p>모은 도장</p><strong id="total-stamps">0</strong>개</div>
      <span style="font-size:20px;color:#CCC">›</span>
    </div>
  </div>

  <!-- ③ 존 -->
  <div id="screen-zone" class="screen">
    <div class="zone-header">
      <button class="btn-back" onclick="goScreen('subject')">←</button>
      <div class="zone-title" id="zone-title">국어</div>
    </div>
    <div class="zone-list" id="zone-list"></div>
  </div>

  <!-- ④ 학습 -->
  <div id="screen-learn" class="screen">
    <div class="learn-header">
      <button class="btn-back" onclick="goScreen('zone')" style="width:34px;height:34px;font-size:14px">←</button>
      <div class="learn-progress-bar"><div class="learn-progress-fill" id="learn-progress-fill" style="width:0%"></div></div>
      <div class="learn-step-txt" id="learn-step-txt">0/0</div>
    </div>
    <div class="learn-card" id="learn-card">
      <div class="card-top-band" id="card-top-band"></div>
      <div class="card-body">
        <div class="card-subject-label" id="card-subject-label">🚌 국어</div>
        <div class="card-visual" id="card-visual"></div>
        <button class="btn-sound" id="btn-sound" onclick="playSound()">🔊 <span id="sound-label">들어봐요</span></button>
        <div class="card-sub-text" id="card-hint"></div>
      </div>
    </div>
    <div class="options-grid" id="options-grid"></div>
    <button class="btn-next" id="btn-next" onclick="nextPage()">다음 ➡️</button>
  </div>

// ═══════════════════════════════════════
// 페이지 빌더
// ═══════════════════════════════════════
function buildPages(zone) {
  const pages = [];
  zone.items.forEach((item, i) => {
    // listen 페이지
    pages.push({ type:'listen', char:item.char, label:item.name, hint:item.context||'', emoji:item.emoji, ttsText:item.sound, item });
    // choose 페이지
    const others = zone.items.filter((_,j)=>j!==i);
    const picks = [...others].sort(()=>Math.random()-0.5).slice(0,2);
    const opts = [item, ...picks].sort(()=>Math.random()-0.5);
    pages.push({ type:'choose', char:item.char, label:item.name, hint:`"${item.name}" 을 찾아봐요! 👀`, emoji:item.emoji, ttsText:item.sound, options:opts, answer:item.char, item });
  });
  return pages;
}

const ZONES = {};
Object.entries(CURRICULUM).forEach(([k,v]) => {
  ZONES[k] = v.zones.map(z => ({...z, pages:buildPages(z)}));
});

  stamps:0, progress:{korean:0,math:0,english:0},
  settings:{freeNav:false,autoSound:true}, answered:false,
};
function saveState(){ try{ localStorage.setItem('broom_v2', JSON.stringify(state)); }catch(e){} }
function loadState(){ try{ const s=localStorage.getItem('broom_v2'); if(s) state={...state,...JSON.parse(s)}; }catch(e){} }

// ═══════════════════════════════════════
// 오디오
// ═══════════════════════════════════════
function speakTTS(text, lang) {
  if(!window.speechSynthesis) return;
  lang = lang || (state.currentSubject==='english' ? 'en-US' : 'ko-KR');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
function playSound() {
  const page = ZONES[state.currentSubject][state.currentZoneIdx].pages[state.currentPageIdx];
  speakTTS(page.ttsText || page.label);
}

// ═══════════════════════════════════════
// 비주얼 렌더러 — 핵심!
// ═══════════════════════════════════════
function renderCardVisual(page, subject) {
  const item = page.item;
  const vis = document.getElementById('card-visual');

  // 수학 — 숫자 (카운팅)
  if(item.count !== undefined) {
    const num = parseInt(item.char);
    const dots = item.count;
    vis.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="font-size:80px;font-weight:900;color:#FF5252;line-height:1">${item.char}</div>
        <div style="font-size:28px;letter-spacing:3px;line-height:1.4">${dots}</div>
        <div style="font-size:15px;font-weight:700;color:#FF5252">${item.name}</div>
      </div>`;
    return;
  }

  // 수학 — 크다/작다 비교
  if(item.compare) {
    const c = item.compare;
    const isBig = item.char==='크다'||item.char==='많다'||item.char==='길다';
    vis.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
        <div style="display:flex;align-items:center;gap:20px">
          <div style="font-size:${isBig?'56px':'36px'};line-height:1">${c.big}</div>
          <div style="font-size:18px;color:#CCC">↔</div>
          <div style="font-size:${!isBig?'56px':'36px'};line-height:1">${c.small}</div>
        </div>
        <div style="font-size:28px;font-weight:900;color:#FF5252">${item.char}</div>
      </div>`;
    return;
  }

  // 수학 — 더하기
  if(item.eq) {
    const {a,b,r,e} = item.eq;
    const makeEmojis = (n) => Array(n).fill(e).join('');
    vis.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="display:flex;align-items:center;gap:8px;font-size:22px">
          <span>${makeEmojis(a)}</span>
          <span style="font-size:24px;font-weight:900;color:#FF5252">+</span>
          <span>${makeEmojis(b)}</span>
        </div>
        <div style="font-size:20px;font-weight:900;color:#FF5252">=</div>
        <div style="font-size:22px">${makeEmojis(r)}</div>
        <div style="font-size:32px;font-weight:900;color:#FF5252">${item.char}</div>
      </div>`;
    return;
  }

  // 자음 — 글자 + 키워드 이모지 + 설명
  if(subject==='korean' && item.keyword && item.char.length===1 && 'ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎㅏㅑㅓㅕㅗㅛㅜㅠㅡㅣ'.includes(item.char)) {
    vis.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="display:flex;align-items:center;gap:16px">
          <div style="font-size:72px;font-weight:900;color:#2D2D2D;line-height:1">${item.char}</div>
          <div style="font-size:56px;line-height:1">${item.emoji}</div>
        </div>
        <div style="background:#FFF3C4;border:2px solid #FFB800;border-radius:20px;padding:5px 16px;font-size:13px;font-weight:700;color:#E09800">${item.keyword}</div>
      </div>`;
    return;
  }

  // 영어 알파벳
  if(subject==='english' && item.char.length===1 && /[A-Z]/.test(item.char)) {
    vis.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="font-size:76px;font-weight:900;color:#4285F4;line-height:1">${item.char}</div>
          <div style="font-size:52px;line-height:1">${item.emoji}</div>
        </div>
        <div style="background:#E8F0FE;border:2px solid #4285F4;border-radius:20px;padding:5px 16px;font-size:13px;font-weight:700;color:#1A56C4">${item.keyword}</div>
      </div>`;
    return;
  }

  // 단어/문장 — 이모지 크게 + 글자
  const isSentence = item.char.length > 4;
  vis.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="font-size:${isSentence?'52px':'64px'};line-height:1">${item.emoji}</div>
      <div style="font-size:${isSentence?'22px':'40px'};font-weight:900;color:#2D2D2D;text-align:center;line-height:1.3">${item.char}</div>
    </div>`;
}

function setAccent(subject) {
  const s = CURRICULUM[subject];
  document.documentElement.style.setProperty('--accent', s.color);
  document.documentElement.style.setProperty('--accent-dark', s.dark);
  document.documentElement.style.setProperty('--accent-light', s.light);
}

function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('bottom-nav').style.display = name==='learn'?'none':'flex';
  if(name==='subject') renderSubject();
  if(name==='zone')    renderZone();
  if(name==='garage')  renderGarage();
  if(name==='settings') renderSettings();
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const m={subject:'nav-home',garage:'nav-garage',settings:'nav-settings'};
  if(m[name]) document.getElementById(m[name])?.classList.add('active');
}
function navTo(s){ goScreen(s); }

function renderSubject() {
  setAccent('korean');

  document.getElementById('total-stamps').textContent=state.stamps;
  ['korean','math','english'].forEach(k=>{
    const total=ZONES[k].reduce((a,z)=>a+z.pages.length,0);

    const pct=Math.min(100,Math.round(done/total*100));

  const doneAll=Object.values(state.progress).reduce((a,v)=>a+v,0);
  document.getElementById('total-progress-fill').style.width=Math.min(100,Math.round(doneAll/totalAll*100))+'%';
}

function renderZone() {
  setAccent(state.currentSubject);
  const icons={korean:'🚌',math:'🚒',english:'🚓'};
  const names={korean:'국어',math:'수학',english:'영어'};
  document.getElementById('zone-title').textContent=icons[state.currentSubject]+' '+names[state.currentSubject];
  const zones=ZONES[state.currentSubject];
  let totalDone=0;
  document.getElementById('zone-list').innerHTML=zones.map((z,i)=>{
    const isDone=(state.progress[state.currentSubject]||0)>=totalDone+z.pages.length;
    const isLocked=!state.settings?.freeNav&&i>0&&(state.progress[state.currentSubject]||0)<totalDone;
    totalDone+=z.pages.length;
    return `<div class="zone-card ${isLocked?'locked':''} ${!isLocked&&!isDone?'active-zone':''}" onclick="startZone(${i})">
      <div class="zone-num ${isDone?'done':''}">${isDone?'✓':i+1}</div>
      <div class="zone-info">
        <div class="zone-name">${z.name}</div>
        <div class="zone-sub">${z.desc} · ${z.pages.length}장</div>
      </div>
      <div class="zone-arrow">›</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// 학습
// ═══════════════════════════════════════
function startZone(i){ state.currentZoneIdx=i; state.currentPageIdx=0; state.answered=false; goScreen('learn'); renderPage(); }

function renderPage() {
  const zone=ZONES[state.currentSubject][state.currentZoneIdx];
  const page=zone.pages[state.currentPageIdx];
  const total=zone.pages.length;
  document.getElementById('learn-progress-fill').style.width=((state.currentPageIdx+1)/total*100)+'%';
  document.getElementById('learn-step-txt').textContent=`${state.currentPageIdx+1}/${total}`;

  const icons={korean:'🚌 국어',math:'🚒 수학',english:'🚓 영어'};
  document.getElementById('card-subject-label').textContent=icons[state.currentSubject];
  document.getElementById('sound-label').textContent=page.label;
  document.getElementById('card-hint').textContent=page.hint;

  // 비주얼
  renderCardVisual(page, state.currentSubject);

  const grid=document.getElementById('options-grid');
  const nextBtn=document.getElementById('btn-next');
  state.answered=false; nextBtn.classList.remove('visible');

  if(page.type==='listen') {
    grid.innerHTML='';
    nextBtn.classList.add('visible'); nextBtn.textContent='다음 ➡️';
    if(state.settings?.autoSound!==false) setTimeout(()=>playSound(),400);
  } else {
    // 보기 스타일: 자음/모음/알파벳은 글자만 크게, 나머지는 이모지+글자
    const isCharOnly = page.item && (
      'ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎㅏㅑㅓㅕㅗㅛㅜㅠㅡㅣ'.includes(page.char) ||
      /^[A-Z]$/.test(page.char) ||
      /^[0-9]+$/.test(page.char) ||
      ['○','△','□','★','♥'].includes(page.char)
    );
    grid.innerHTML=page.options.map(opt=>{
      const safe = opt.char.replace(/'/g,"\\'");
      if(isCharOnly) {
        return `<button class="option-btn" onclick="checkAnswer('${safe}',this)">
          <span style="font-size:34px;font-weight:900;line-height:1">${opt.char}</span>
        </button>`;
      } else {
        return `<button class="option-btn" onclick="checkAnswer('${safe}',this)">
          <span class="opt-emoji">${opt.emoji}</span>
          <span class="opt-char" style="font-size:${opt.char.length>3?'14px':'18px'}">${opt.char}</span>
        </button>`;
      }
    }).join('');
    if(state.settings?.autoSound!==false) setTimeout(()=>playSound(),400);
  }
}

function checkAnswer(selected, btn) {
  if(state.answered) return;
  state.answered=true;
  const page=ZONES[state.currentSubject][state.currentZoneIdx].pages[state.currentPageIdx];
  if(selected===page.answer){
    btn.classList.add('correct'); state.stamps++; saveState();
    speakTTS('잘했어요','ko-KR');
    setTimeout(()=>document.getElementById('btn-next').classList.add('visible'),500);
  } else {
    btn.classList.add('wrong');
    speakTTS('다시 해봐요','ko-KR');
    setTimeout(()=>{btn.classList.remove('wrong');state.answered=false;},900);
  }
}

function nextPage() {
  const zone=ZONES[state.currentSubject][state.currentZoneIdx];
  state.progress[state.currentSubject]=Math.max(state.progress[state.currentSubject]||0, state.currentPageIdx+1);
  saveState();
  if(state.currentPageIdx+1>=zone.pages.length) showResult(zone);
  else { state.currentPageIdx++; state.answered=false; renderPage(); }
}

function showResult(zone) {
  goScreen('result');
  document.getElementById('result-title').textContent=`${zone.name} 완료! 🎉`;
  document.getElementById('result-sub').textContent=`${state.userName}, 정말 잘했어요! 👏`;
  document.getElementById('stamp-row').innerHTML=['⭐','⭐','⭐'].map((s,i)=>`<div class="stamp" style="animation-delay:${i*0.15}s">${s}</div>`).join('');
  speakTTS('잘했어요! 정말 대단해요!','ko-KR');
}
function continueLearn(){
  if(state.currentZoneIdx+1<ZONES[state.currentSubject].length) startZone(state.currentZoneIdx+1);
  else goScreen('subject');
}

const GARAGE=[
  {e:'🚌',n:'고속버스'},{e:'🚒',n:'소방차'},{e:'🚓',n:'경찰차'},{e:'🚕',n:'택시'},
  {e:'🚛',n:'덤프트럭'},{e:'🚁',n:'헬리콥터'},{e:'🏍️',n:'오토바이'},{e:'🚂',n:'기차'},
  {e:'🚀',n:'로켓'},{e:'🛸',n:'UFO'},{e:'🚢',n:'크루즈'},{e:'✈️',n:'비행기'},
];
function renderGarage(){
  const done=Object.values(state.progress).reduce((a,v)=>a+v,0);
  const unlocked=Math.min(GARAGE.length-1, Math.floor(done/20));
  document.getElementById('garage-grid').innerHTML=GARAGE.map((v,i)=>`
    <div class="garage-item ${i<=unlocked?'':'locked'}">
      <div class="g-emoji">${v.e}</div><p>${v.n}</p>
    </div>`).join('');
}

// ═══════════════════════════════════════
// 설정
// ═══════════════════════════════════════
function renderSettings(){
  document.getElementById('settings-name-input').value=state.userName;
  document.getElementById('toggle-free-nav').checked=state.settings?.freeNav||false;
  document.getElementById('toggle-auto-sound').checked=state.settings?.autoSound!==false;
  const total=Object.values(ZONES).reduce((a,zones)=>a+zones.reduce((b,z)=>b+z.pages.length,0),0);
  const done=Object.values(state.progress).reduce((a,v)=>a+v,0);
  document.getElementById('settings-stats').textContent=`전체 ${total}장 중 ${done}장 완료 · 도장 ${state.stamps}개`;
}
function saveName(){ const v=document.getElementById('settings-name-input').value.trim(); if(!v)return; state.userName=v; saveState(); showToast('✅ 이름 저장!'); }
function toggleSetting(k,v){ if(!state.settings)state.settings={}; state.settings[k]=v; saveState(); showToast('✅ 설정 저장!'); }
function showToast(msg){ const t=document.getElementById('save-toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function confirmReset(){ if(confirm('학습 기록을 모두 지울까요?')){ localStorage.removeItem('broom_v2'); location.reload(); } }

window.onload=()=>{ loadState(); if(state.userName){ setAccent('korean'); goScreen('subject'); } };
</script>
