<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>부릉부릉 학교</title>
<style>
  /* ── 토큰 ── */
  :root {
    --bg: #FFF9F0;
    --road: #4A4A4A;
    --road-line: #FFD93D;
    --korean-main: #FFB800;
    --korean-dark: #E09800;
    --korean-light: #FFF3C4;
    --correct: #4CAF50;
    --wrong: #FF5252;
    --text-dark: #2D2D2D;
    --text-mid: #666;
    --white: #FFFFFF;
    --shadow: 0 4px 16px rgba(0,0,0,0.12);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #2D2D2D;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── 도로 배경 ── */
  .road-bg {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: min(100vw, calc(100vh * 16 / 9));
    height: 80px;
    background: var(--road);
    z-index: 0;
  }
  .road-bg::after {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 6px;
    background: repeating-linear-gradient(90deg, var(--road-line) 0px, var(--road-line) 40px, transparent 40px, transparent 80px);
    transform: translateY(-50%);
  }

  /* ── 앱 래퍼 (9:16 고정) ── */
  #app {
    position: relative;
    z-index: 1;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    max-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: 0 0 64px 0;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.18);
  }

  /* ── 화면 전환 ── */
  .screen {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .screen.active { display: flex; }
  /* 존/차고지만 스크롤 허용 */
  #screen-zone, #screen-garage {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ══════════════════════════════════
     시작 화면
  ══════════════════════════════════ */
  #screen-start {
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 24px;
  }

  .app-logo {
    font-size: 72px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .app-title {
    font-size: 32px;
    font-weight: 900;
    color: var(--text-dark);
    letter-spacing: -1px;
    text-align: center;
  }
  .app-title span {
    color: var(--korean-main);
    display: block;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .name-input-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .name-input-wrap label {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-mid);
    text-align: center;
  }
  .name-input-wrap input {
    width: 100%;
    padding: 16px 20px;
    border: 3px solid var(--korean-main);
    border-radius: var(--radius);
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    color: var(--text-dark);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input-wrap input:focus { border-color: var(--korean-dark); }
  .name-input-wrap input::placeholder { color: #CCC; font-weight: 400; }

  .btn-start {
    width: 100%;
    padding: 20px;
    background: var(--korean-main);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-size: 22px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--korean-dark);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }
  .btn-start:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--korean-dark);
  }

  /* ══════════════════════════════════
     과목 선택 화면
  ══════════════════════════════════ */
  #screen-subject {
    padding: 16px 20px;
    gap: 12px;
    justify-content: space-between;
    overflow: hidden;
  }

  .greeting {
    font-size: 18px;
    font-weight: 900;
    color: var(--text-dark);
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
  }
  .greeting em { color: var(--korean-main); font-style: normal; }

  .progress-strip {
    background: var(--white);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }
  .star-count { font-size: 28px; }
  .star-info { flex: 1; }
  .star-info p { font-size: 12px; color: var(--text-mid); }
  .star-info strong { font-size: 18px; font-weight: 900; color: var(--text-dark); }

  .subject-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    margin: 0;
  }

  .subject-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: border-color 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
    flex: 1;
  }
  .subject-card:active { transform: scale(0.97); }
  .subject-card.korean { border-color: var(--korean-main); }
  .subject-card.math { border-color: #FF5252; }
  .subject-card.english { border-color: #4285F4; }

  .subject-icon { font-size: 40px; flex-shrink: 0; }
  .subject-info { flex: 1; }
  .subject-name { font-size: 20px; font-weight: 900; color: var(--text-dark); }
  .subject-desc { font-size: 13px; color: var(--text-mid); margin-top: 2px; }
  .subject-badge {
    background: var(--korean-main);
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .badge-soon { background: #CCC; }

  /* 도로 진행 바 */
  .road-progress {
    background: var(--white);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .road-progress-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-mid);
    margin-bottom: 8px;
  }
  .road-track {
    height: 16px;
    background: #EEE;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .road-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--korean-main), var(--korean-dark));
    border-radius: 8px;
    transition: width 0.5s ease;
    min-width: 24px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
  }
  .road-car { font-size: 14px; }

  /* ══════════════════════════════════
     존 선택 화면
  ══════════════════════════════════ */
  #screen-zone {
    padding: 24px 20px;
    gap: 16px;
  }

  .zone-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .btn-back {
    background: var(--white);
    border: none;
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
  }
  .zone-title { font-size: 22px; font-weight: 900; color: var(--text-dark); }

  .zone-list { display: flex; flex-direction: column; gap: 12px; }

  .zone-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .zone-card:active { transform: scale(0.97); }
  .zone-card.locked { opacity: 0.4; pointer-events: none; }

  .zone-num {
    width: 44px; height: 44px;
    background: var(--korean-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: var(--korean-dark);
    flex-shrink: 0;
  }
  .zone-num.done { background: var(--correct); color: var(--white); }
  .zone-info { flex: 1; }
  .zone-name { font-size: 17px; font-weight: 700; color: var(--text-dark); }
  .zone-sub { font-size: 13px; color: var(--text-mid); margin-top: 2px; }
  .zone-arrow { font-size: 20px; color: #CCC; }

  /* ══════════════════════════════════
     학습 화면
  ══════════════════════════════════ */
  #screen-learn {
    padding: 16px 20px;
    gap: 16px;
  }

  /* 상단 바 */
  .learn-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .learn-progress-bar {
    flex: 1;
    height: 10px;
    background: #EEE;
    border-radius: 5px;
    overflow: hidden;
  }
  .learn-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--korean-main), var(--korean-dark));
    border-radius: 5px;
    transition: width 0.4s ease;
  }
  .learn-step-txt { font-size: 14px; font-weight: 700; color: var(--text-mid); white-space: nowrap; }

  /* 카드 영역 */
  .learn-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    flex: 1;
    min-height: 320px;
    justify-content: center;
    position: relative;
  }

  .card-subject-label {
    position: absolute;
    top: 16px; left: 20px;
    font-size: 12px;
    font-weight: 700;
    color: var(--korean-main);
    letter-spacing: 1px;
  }

  /* SVG 차량 영역 */
  .card-vehicle {
    width: 160px;
    height: 100px;
  }

  /* 핵심 글자/숫자 표시 */
  .card-main-char {
    font-size: 96px;
    font-weight: 900;
    color: var(--text-dark);
    line-height: 1;
    letter-spacing: -2px;
  }

  /* 소리 버튼 */
  .btn-sound {
    background: var(--korean-light);
    border: 3px solid var(--korean-main);
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 18px;
    font-weight: 700;
    color: var(--korean-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.1s, background 0.15s;
  }
  .btn-sound:active { transform: scale(0.94); background: var(--korean-main); color: var(--white); }
  .btn-sound.playing { background: var(--korean-main); color: var(--white); }

  /* 안내 텍스트 */
  .card-hint {
    font-size: 15px;
    color: var(--text-mid);
    font-weight: 600;
    text-align: center;
  }

  /* 보기 선택지 */
  .options-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
  }
  .options-grid.two-col { grid-template-columns: repeat(2, 1fr); }

  .option-btn {
    background: var(--white);
    border: 3px solid #E0E0E0;
    border-radius: var(--radius-sm);
    padding: 16px 8px;
    font-size: 28px;
    font-weight: 900;
    color: var(--text-dark);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    box-shadow: 0 3px 0 #DDD;
  }
  .option-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #DDD; }
  .option-btn.correct {
    border-color: var(--correct);
    background: #E8F5E9;
    box-shadow: 0 3px 0 #4CAF50;
    animation: correctPop 0.3s ease;
  }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: #FFEBEE;
    box-shadow: 0 3px 0 #FF5252;
    animation: shake 0.3s ease;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* 다음 버튼 */
  .btn-next {
    width: 100%;
    padding: 18px;
    background: var(--korean-main);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--korean-dark);
    transition: transform 0.1s, box-shadow 0.1s;
    display: none;
  }
  .btn-next.visible { display: block; }
  .btn-next:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--korean-dark); }

  /* ══════════════════════════════════
     결과 화면
  ══════════════════════════════════ */
  #screen-result {
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 24px;
  }

  .result-emoji { font-size: 80px; animation: bounce 1s infinite; }
  .result-title { font-size: 30px; font-weight: 900; color: var(--text-dark); text-align: center; }
  .result-sub { font-size: 17px; color: var(--text-mid); text-align: center; }

  .stamp-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .stamp {
    width: 56px; height: 56px;
    background: var(--korean-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    border: 3px solid var(--korean-main);
    animation: stampIn 0.4s ease backwards;
  }
  @keyframes stampIn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }

  .result-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .btn-continue {
    padding: 18px;
    background: var(--korean-main);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-size: 19px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--korean-dark);
  }
  .btn-home {
    padding: 14px;
    background: var(--white);
    color: var(--text-mid);
    border: 2px solid #DDD;
    border-radius: var(--radius);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
  }

  /* ══════════════════════════════════
     차고지 (컬렉션) 화면
  ══════════════════════════════════ */
  #screen-garage {
    padding: 24px 20px;
    gap: 16px;
  }
  .garage-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .garage-item {
    background: var(--white);
    border-radius: var(--radius-sm);
    padding: 16px 8px;
    text-align: center;
    box-shadow: var(--shadow);
    font-size: 40px;
  }
  .garage-item.locked { opacity: 0.2; filter: grayscale(1); }
  .garage-item p { font-size: 11px; color: var(--text-mid); margin-top: 6px; font-weight: 600; }

  /* ══════════════════════════════════
     하단 네비
  ══════════════════════════════════ */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    background: var(--white);
    border-top: 2px solid #EEE;
    display: flex;
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 0;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
    color: #BBB;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--korean-main); }
  .nav-btn span:first-child { font-size: 24px; }

  /* ══════════════════════════════════
     설정 화면
  ══════════════════════════════════ */
  #screen-settings {
    padding: 16px 20px;
    gap: 14px;
    overflow-y: auto;
  }

  .settings-header {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .settings-section {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .settings-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 1px;
    padding: 12px 20px 4px;
  }

  .settings-row {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    gap: 14px;
    border-top: 1px solid #F0F0F0;
  }
  .settings-row:first-of-type { border-top: none; }

  .settings-row-icon { font-size: 26px; flex-shrink: 0; }
  .settings-row-info { flex: 1; }
  .settings-row-title { font-size: 16px; font-weight: 700; color: var(--text-dark); }
  .settings-row-desc  { font-size: 12px; color: var(--text-mid); margin-top: 2px; }

  /* 토글 스위치 */
  .toggle-wrap { position: relative; width: 52px; height: 28px; flex-shrink: 0; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #CCC;
    border-radius: 28px;
    cursor: pointer;
    transition: background 0.25s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.25s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle-wrap input:checked + .toggle-slider { background: var(--korean-main); }
  .toggle-wrap input:checked + .toggle-slider::before { transform: translateX(24px); }

  /* 이름 수정 인풋 */
  .settings-name-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 12px 20px 16px;
  }
  .settings-name-input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid #E0E0E0;
    border-radius: var(--radius-sm);
    font-size: 18px;
    font-weight: 700;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .settings-name-input:focus { border-color: var(--korean-main); }
  .btn-name-save {
    padding: 10px 18px;
    background: var(--korean-main);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--korean-dark);
    white-space: nowrap;
  }
  .btn-name-save:active { transform: translateY(2px); box-shadow: none; }

  .settings-save-toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2D2D2D;
    color: white;
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .settings-save-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 초기화 버튼 */
  .btn-reset {
    width: 100%;
    padding: 14px;
    background: none;
    border: 2px solid #FFCDD2;
    border-radius: var(--radius);
    color: var(--wrong);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-reset:active { background: #FFEBEE; }

</style>
</head>
<body>

<div class="road-bg"></div>

<div id="app">

  <!-- ① 시작 화면 -->
  <div id="screen-start" class="screen active">
    <div class="app-logo">🚌</div>
    <div class="app-title">
      부릉부릉 학교
      <span>BROOM BROOM SCHOOL</span>
    </div>
    <div class="name-input-wrap">
      <label>이름을 알려줘요!</label>
      <input type="text" id="input-name" placeholder="예: 지민이" maxlength="6">
    </div>
    <button class="btn-start" onclick="startApp()">출발! 🚀</button>
  </div>

  <!-- ② 과목 선택 화면 -->
  <div id="screen-subject" class="screen">
    <div class="greeting" id="greeting-text"></div>

    <div class="road-progress">
      <div class="road-progress-label">🛣️ 전체 진행</div>
      <div class="road-track">
        <div class="road-fill" id="total-progress-fill" style="width:0%">
          <span class="road-car">🚌</span>
        </div>
      </div>
    </div>

// ═══════════════════════════════════════════
// 페이지 빌더 — 아이템 → 학습 페이지 자동 생성
// ═══════════════════════════════════════════
function buildPages(zone, subjectKey) {
  const pages = [];
  const items = zone.items;

  items.forEach((item, i) => {
    // 페이지 1: 듣기 (listen)
    pages.push({
      id: `${zone.id}-${i}-listen`,
      type: 'listen',
      char: item.char,
      label: item.name,
      hint: `"${item.name}" 들어봐요! 🔊`,
      emoji: item.emoji,
      audio: item.audio === 'tts' ? null : `audio/${item.audio}.mp3`,
      ttsText: item.sound,
    });

    // 페이지 2: 고르기 (choose) — 3개 중 정답
    const others = items.filter((_, j) => j !== i);
    const picks = others.sort(() => Math.random() - 0.5).slice(0, 2);
    const opts = [item.char, picks[0]?.char, picks[1]?.char]
      .filter(Boolean)
      .sort(() => Math.random() - 0.5);

    pages.push({
      id: `${zone.id}-${i}-choose`,
      type: 'choose',
      char: item.char,
      label: item.name,
      hint: `"${item.name}" 찾아봐요! 👀`,
      emoji: item.emoji,
      audio: item.audio === 'tts' ? null : `audio/${item.audio}.mp3`,
      ttsText: item.sound,
      options: opts,
      answer: item.char,
    });
  });

  return pages;
}

// ZONES 형태로 변환 (엔진 호환)
const ZONES = {};
Object.entries(CURRICULUM).forEach(([subjectKey, subject]) => {
  ZONES[subjectKey] = subject.zones.map(zone => ({
    ...zone,
    pages: buildPages(zone, subjectKey)
  }));
});

<script>
/* ═══════════════════════════════════════════
   DATA — 국어 Zone 1: 자음 (14자)
   오디오 파일은 같은 폴더에 있어야 함
   예: audio/01_기역.mp3
═══════════════════════════════════════════ */

// 데이터는 data.js에서 로드 (ZONES 전역변수 사용)

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let state = {
  userName: '',
  currentSubject: 'korean',
  currentZoneIdx: 0,
  currentPageIdx: 0,
  stamps: 0,
  progress: { korean: 0, math: 0, english: 0 },
  settings: { freeNav: false, autoSound: true },
  unlockedVehicles: [],
  answered: false,
};

function saveState() {
  localStorage.setItem('broom_state', JSON.stringify(state));
}
function loadState() {
  const s = localStorage.getItem('broom_state');
  if (s) {
    try { state = { ...state, ...JSON.parse(s) }; } catch(e) {}
  }
}

/* ═══════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════ */
let currentAudio = null;

function playAudio(src, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const a = new Audio(src);
  currentAudio = a;
  const btn = document.getElementById('btn-sound');
  if (btn) { btn.classList.add('playing'); }
  a.play().catch(() => {
    // 파일 없으면 브라우저 TTS fallback
    const label = document.getElementById('sound-label');
    if (label) speakFallback(label.textContent);
  });
  a.onended = () => {
    if (btn) btn.classList.remove('playing');
    if (onEnd) onEnd();
  };
}

function speakFallback(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.85;
  speechSynthesis.speak(u);
}

function playSound() {
  const pages = ZONES[state.currentSubject][state.currentZoneIdx].pages;
  const page = pages[state.currentPageIdx];
  if (page.audio) {
    playAudio(page.audio);
  } else {
    speakFallback(page.ttsText || page.label);
  }
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');

  const nav = document.getElementById('bottom-nav');
  nav.style.display = name === 'learn' ? 'none' : 'flex';

  if (name === 'subject') renderSubject();
  if (name === 'zone') renderZone();
  if (name === 'garage') renderGarage();
  if (name === 'settings') renderSettings();
  // 네비 활성화
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navMap = { subject:'nav-home', garage:'nav-garage', settings:'nav-settings' };
  if (navMap[name]) document.getElementById(navMap[name])?.classList.add('active');
}

/* ═══════════════════════════════════════════
   시작
═══════════════════════════════════════════ */
function startApp() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { document.getElementById('input-name').focus(); return; }
  state.userName = name;
  saveState();
  goScreen('subject');
}

/* ═══════════════════════════════════════════
   과목 화면
═══════════════════════════════════════════ */
function renderSubject() {
  document.getElementById('greeting-text').innerHTML =
    `<em>${state.userName}</em>, 오늘도 출발해볼까요? 🚌`;
  document.getElementById('total-stamps').textContent = state.stamps;

  const totalPages = ZONES.korean.reduce((a,z) => a + z.pages.length, 0);
  const done = state.progress.korean || 0;
  const pct = Math.min(100, Math.round(done / totalPages * 100));
  document.getElementById('total-progress-fill').style.width = pct + '%';
}

/* ═══════════════════════════════════════════
   존 화면
═══════════════════════════════════════════ */
function goToZone(subject) {
  state.currentSubject = subject;
  goScreen('zone');
}

function updateZoneTitle() {
  const titles = { korean:'🚌 국어', math:'🚒 수학', english:'🚓 영어' };
  const el = document.getElementById('zone-title');
  if (el) el.textContent = titles[state.currentSubject] || '';
}

function renderZone() {
  updateZoneTitle();
  const zones = ZONES[state.currentSubject];
  const list = document.getElementById('zone-list');
  let totalDone = 0;

  list.innerHTML = zones.map((z, i) => {
    const isDone = (state.progress[state.currentSubject] || 0) >= totalDone + z.pages.length;
    const isLocked = !state.settings?.freeNav && i > 0 && (state.progress[state.currentSubject] || 0) < totalDone;
    totalDone += z.pages.length;
    return `
      <div class="zone-card ${isLocked ? 'locked' : ''}" onclick="startZone(${i})">
        <div class="zone-num ${isDone ? 'done' : ''}">${isDone ? '✓' : i+1}</div>
        <div class="zone-info">
          <div class="zone-name">${z.name}</div>
          <div class="zone-sub">${z.desc} · ${z.pages.length}장</div>
        </div>
        <div class="zone-arrow">›</div>
      </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   학습 시작
═══════════════════════════════════════════ */
function startZone(zoneIdx) {
  state.currentZoneIdx = zoneIdx;
  state.currentPageIdx = 0;
  state.answered = false;
  goScreen('learn');
  renderPage();
}

/* ═══════════════════════════════════════════
   페이지 렌더
═══════════════════════════════════════════ */
function renderPage() {
  const zone = ZONES[state.currentSubject][state.currentZoneIdx];
  const page = zone.pages[state.currentPageIdx];
  const total = zone.pages.length;
  const current = state.currentPageIdx + 1;

  // 진행 바
  document.getElementById('learn-progress-fill').style.width = (current/total*100) + '%';
  document.getElementById('learn-step-txt').textContent = `${current}/${total}`;

  // 카드
  document.getElementById('card-char').textContent = page.char;
  document.getElementById('card-hint').textContent = page.hint;
  document.getElementById('sound-label').textContent = page.label;

  // 선택지
  const grid = document.getElementById('options-grid');
  const nextBtn = document.getElementById('btn-next');
  state.answered = false;
  nextBtn.classList.remove('visible');

  if (page.type === 'listen') {
    grid.innerHTML = '';
    nextBtn.classList.add('visible');
    nextBtn.textContent = '다음 ➡️';
    // 자동 재생
    if (state.settings?.autoSound !== false) setTimeout(() => playSound(), 400);

  } else if (page.type === 'choose') {
    grid.innerHTML = page.options.map(opt =>
      `<button class="option-btn" onclick="checkAnswer('${opt}', this)">${opt}</button>`
    ).join('');
    // 힌트음 자동 재생
    if (state.settings?.autoSound !== false) setTimeout(() => playSound(), 400);
  }
}

/* ═══════════════════════════════════════════
   정답 체크
═══════════════════════════════════════════ */
function checkAnswer(selected, btn) {
  if (state.answered) return;
  state.answered = true;

  const zone = ZONES[state.currentSubject][state.currentZoneIdx];
  const page = zone.pages[state.currentPageIdx];

  if (selected === page.answer) {
    btn.classList.add('correct');
    state.stamps++;
    saveState();
    playAudio('audio/30_잘했어요.mp3');
    setTimeout(() => {
      document.getElementById('btn-next').classList.add('visible');
    }, 600);
  } else {
    btn.classList.add('wrong');
    playAudio('audio/31_다시해봐요.mp3');
    setTimeout(() => {
      btn.classList.remove('wrong');
      state.answered = false;
    }, 900);
  }
}

/* ═══════════════════════════════════════════
   다음 페이지
═══════════════════════════════════════════ */
function nextPage() {
  const zone = ZONES[state.currentSubject][state.currentZoneIdx];
  const total = zone.pages.length;

  // 진행 저장
  const globalDone = (state.progress[state.currentSubject] || 0);
  state.progress[state.currentSubject] = Math.max(globalDone, state.currentPageIdx + 1);
  saveState();

  if (state.currentPageIdx + 1 >= total) {
    // 존 완료!
    showResult(zone);
  } else {
    state.currentPageIdx++;
    state.answered = false;
    renderPage();
  }
}

/* ═══════════════════════════════════════════
   결과 화면
═══════════════════════════════════════════ */
function showResult(zone) {
  goScreen('result');
  document.getElementById('result-emoji').textContent = '🎉';
  document.getElementById('result-title').textContent = `${zone.name} 완료!`;
  document.getElementById('result-sub').textContent =
    `${state.userName}가 자음을 다 배웠어요! 🚌💨`;

  const row = document.getElementById('stamp-row');
  row.innerHTML = ['⭐','⭐','⭐'].map((s, i) =>
    `<div class="stamp" style="animation-delay:${i*0.15}s">${s}</div>`
  ).join('');

  playAudio('audio/30_잘했어요.mp3');
}

function continueLearn() {
  const zones = ZONES[state.currentSubject];
  if (state.currentZoneIdx + 1 < zones.length) {
    startZone(state.currentZoneIdx + 1);
  } else {
    goScreen('subject');
  }
}

   차고지
═══════════════════════════════════════════ */

  { emoji:'🚒', name:'소방차', zone:'모음 Zone' },
  { emoji:'🚓', name:'경찰차', zone:'글자 Zone' },
  { emoji:'🚕', name:'택시', zone:'단어 Zone' },
  { emoji:'🚛', name:'덤프트럭', zone:'문장 Zone' },
  { emoji:'🚁', name:'헬리콥터', zone:'수학 Zone1' },
  { emoji:'🏍️', name:'오토바이', zone:'수학 Zone2' },
  { emoji:'🚂', name:'기차', zone:'수학 Zone3' },
  { emoji:'🚀', name:'로켓', zone:'영어 Zone1' },

  const grid = document.getElementById('garage-grid');

    <div class="garage-item ${i === 0 && done ? '' : 'locked'}">
      <div>${v.emoji}</div>
      <p>${v.name}</p>
    </div>

/* ═══════════════════════════════════════════
   네비 + 설정
═══════════════════════════════════════════ */
function navTo(screen) {
  goScreen(screen);
}

function renderSettings() {
  // 이름 인풋
  document.getElementById('settings-name-input').value = state.userName;
  // 토글 상태
  document.getElementById('toggle-free-nav').checked = state.settings?.freeNav || false;
  document.getElementById('toggle-auto-sound').checked = state.settings?.autoSound !== false;
  // 통계
  const totalPages = Object.keys(ZONES).reduce((a, k) =>
    a + ZONES[k].reduce((b, z) => b + z.pages.length, 0), 0);
  const donePgs = Object.values(state.progress).reduce((a, v) => a + v, 0);
  document.getElementById('settings-stats').textContent =
    `전체 ${totalPages}장 중 ${donePgs}장 완료 · 도장 ${state.stamps}개`;
}

function saveName() {
  const val = document.getElementById('settings-name-input').value.trim();
  if (!val) return;
  state.userName = val;
  saveState();
  showToast('✅ 이름이 저장됐어요!');
}

function toggleSetting(key, value) {
  if (!state.settings) state.settings = {};
  state.settings[key] = value;
  saveState();
  showToast('✅ 설정 저장됐어요!');
}

function showToast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function confirmReset() {
  if (confirm('학습 기록을 모두 지울까요?\n이름과 도장이 모두 초기화됩니다.')) {
    localStorage.removeItem('broom_state');
    location.reload();
  }
}

window.onload = () => {
  loadState();
  if (state.userName) {
    goScreen('subject');
  }
};
